<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Experiments</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="container">
    <h1>Animation Playground</h1>
    
    <!-- CSS Animations -->
    <section>
      <h2>CSS Animations</h2>
      <button id="css-pulse-btn">Pulse (Keyframes)</button>
      <button id="css-spin-btn">Spin (Transform)</button>
      <div class="box css-animation-target"></div>
    </section>

    <!-- JS Animations -->
    <section>
      <h2>JavaScript Animations</h2>
      <button id="js-move-btn">Move (GSAP-like)</button>
      <button id="js-bounce-btn">Bounce (Spring Physics)</button>
      <div class="box js-animation-target"></div>
    </section>
  </div>
  <script src="src/script.js"></script>
</body>
</html>
