<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Experiments</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="container">
    <h1>Media Playground</h1>
    
    <!-- Video Player -->
    <section>
      <h2>Custom Video Controls</h2>
      <div class="video-container">
        <video id="custom-video" src="https://samplelib.com/lib/preview/mp4/sample-5s.mp4"></video>
        <div class="controls">
          <button id="play-btn">▶</button>
          <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
          <span id="time">0:00 / 0:00</span>
        </div>
      </div>
    </section>

    <!-- Audio Visualizer -->
    <section>
      <h2>Audio Visualizer (Web Audio API)</h2>
      <input type="file" id="audio-upload" accept="audio/*">
      <canvas id="visualizer" width="600" height="200"></canvas>
    </section>

    <!-- Camera Feed -->
    <section>
      <h2>Webcam Capture</h2>
      <button id="camera-btn">Enable Camera</button>
      <video id="camera-feed" autoplay muted></video>
      <button id="capture-btn">Take Snapshot</button>
      <canvas id="snapshot" width="640" height="480"></canvas>
    </section>
  </div>
  <script src="src/script.js"></script>
</body>
</html>
